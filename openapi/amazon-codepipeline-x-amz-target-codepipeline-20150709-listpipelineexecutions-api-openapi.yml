    post:
      operationId: ListPipelineExecutions
      description: Gets a summary of the most recent executions for a pipeline.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListPipelineExecutionsOutput'
              examples:
                ListPipelineExecutions200Example:
                  summary: Default ListPipelineExecutions 200 response
                  x-microcks-default: true
                  value:
                    pipelineExecutionSummaries: example-value
                    nextToken: example-value
        '480':
          description: ValidationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationException'
              examples:
                ListPipelineExecutions480Example:
                  summary: Default ListPipelineExecutions 480 response
                  x-microcks-default: true
                  value: example-value
        '481':
          description: PipelineNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineNotFoundException'
              examples:
                ListPipelineExecutions481Example:
                  summary: Default ListPipelineExecutions 481 response
                  x-microcks-default: true
                  value: example-value
        '482':
          description: InvalidNextTokenException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidNextTokenException'
              examples:
                ListPipelineExecutions482Example:
                  summary: Default ListPipelineExecutions 482 response
                  x-microcks-default: true
                  value: example-value
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListPipelineExecutionsInput'
            examples:
              ListPipelineExecutionsRequestExample:
                summary: Default ListPipelineExecutions request
                x-microcks-default: true
                value:
                  pipelineName: example-resource
                  maxResults: example-value
                  nextToken: example-value
