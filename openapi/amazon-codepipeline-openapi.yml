openapi: 3.1.0
info:
  title: Amazon CodePipeline API
  description: >-
    Amazon CodePipeline is a fully managed continuous delivery service that
    helps you automate your release pipelines for fast and reliable application
    and infrastructure updates. The API enables programmatic management of
    pipelines, stages, actions, and pipeline executions.
  version: "2015-07-09"
  contact:
    name: Amazon Web Services
    url: https://aws.amazon.com/codepipeline/
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
- url: https://codepipeline.amazonaws.com
  description: Amazon CodePipeline API endpoint
paths:
  /:
    post:
      operationId: CreatePipeline
      summary: Amazon CodePipeline Create a New Pipeline
      description: >-
        Creates a pipeline with the specified name and structure. A pipeline
        consists of stages and actions that process code changes.
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              $ref: "#/components/schemas/CreatePipelineInput"
            examples:
              CreatePipelineRequestExample:
                summary: Default CreatePipeline request
                x-microcks-default: true
                value:
                  pipeline:
                    name: example-resource
                    roleArn: arn:aws:service:us-east-1:123456789012:resource/example
                    stages:
                    - {}
                    version: 1
                  tags:
                  - key: example-value
                    value: example-value
      responses:
        "200":
          description: Pipeline created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pipeline"
              examples:
                CreatePipeline200Example:
                  summary: Default CreatePipeline 200 response
                  x-microcks-default: true
                  value:
                    name: example-resource
                    roleArn: arn:aws:service:us-east-1:123456789012:resource/example
                    stages:
                    - name: example-resource
                      actions: []
                    version: 1
        "400":
          description: Bad request
        "409":
          description: Pipeline already exists
      tags:
      - Pipelines
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /getPipeline:
    post:
      operationId: GetPipeline
      summary: Amazon CodePipeline Get Pipeline Details
      description: >-
        Returns the metadata, structure, stages, and actions of a pipeline.
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              required:
              - name
              properties:
                name:
                  type: string
                  description: The name of the pipeline.
                version:
                  type: integer
                  description: The version number of the pipeline.
            examples:
              GetPipelineRequestExample:
                summary: Default GetPipeline request
                x-microcks-default: true
                value:
                  name: example-resource
                  version: 1
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pipeline"
              examples:
                GetPipeline200Example:
                  summary: Default GetPipeline 200 response
                  x-microcks-default: true
                  value:
                    name: example-resource
                    roleArn: arn:aws:service:us-east-1:123456789012:resource/example
                    stages:
                    - name: example-resource
                      actions: []
                    version: 1
        "404":
          description: Pipeline not found
      tags:
      - Pipelines
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /listPipelines:
    post:
      operationId: ListPipelines
      summary: Amazon CodePipeline List Pipelines
      description: Gets a summary of all of the pipelines associated with your account.
      requestBody:
        required: false
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                nextToken:
                  type: string
                maxResults:
                  type: integer
            examples:
              ListPipelinesRequestExample:
                summary: Default ListPipelines request
                x-microcks-default: true
                value:
                  nextToken: example-value
                  maxResults: 1
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineList"
              examples:
                ListPipelines200Example:
                  summary: Default ListPipelines 200 response
                  x-microcks-default: true
                  value:
                    pipelines:
                    - name: example-resource
                      version: 1
                      created: example-value
                      updated: example-value
                    nextToken: example-value
      tags:
      - Pipelines
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /deletePipeline:
    post:
      operationId: DeletePipeline
      summary: Amazon CodePipeline Delete a Pipeline
      description: Deletes the specified pipeline.
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              required:
              - name
              properties:
                name:
                  type: string
                  description: The name of the pipeline to delete.
            examples:
              DeletePipelineRequestExample:
                summary: Default DeletePipeline request
                x-microcks-default: true
                value:
                  name: example-resource
      responses:
        "200":
          description: Pipeline deleted successfully
        "404":
          description: Pipeline not found
      tags:
      - Pipelines
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /startPipelineExecution:
    post:
      operationId: StartPipelineExecution
      summary: Amazon CodePipeline Start a Pipeline Execution
      description: Starts the specified pipeline, causing it to run its most recent revision.
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              required:
              - name
              properties:
                name:
                  type: string
                  description: The name of the pipeline to start.
            examples:
              StartPipelineExecutionRequestExample:
                summary: Default StartPipelineExecution request
                x-microcks-default: true
                value:
                  name: example-resource
      responses:
        "200":
          description: Pipeline execution started
          content:
            application/json:
              schema:
                type: object
                properties:
                  pipelineExecutionId:
                    type: string
              examples:
                StartPipelineExecution200Example:
                  summary: Default StartPipelineExecution 200 response
                  x-microcks-default: true
                  value:
                    pipelineExecutionId: '500123'
        "404":
          description: Pipeline not found
      tags:
      - Executions
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /getPipelineExecution:
    post:
      operationId: GetPipelineExecution
      summary: Amazon CodePipeline Get Pipeline Execution Details
      description: Returns information about an execution of a pipeline.
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              required:
              - pipelineName
              - pipelineExecutionId
              properties:
                pipelineName:
                  type: string
                pipelineExecutionId:
                  type: string
            examples:
              GetPipelineExecutionRequestExample:
                summary: Default GetPipelineExecution request
                x-microcks-default: true
                value:
                  pipelineName: example-resource
                  pipelineExecutionId: '500123'
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineExecution"
              examples:
                GetPipelineExecution200Example:
                  summary: Default GetPipelineExecution 200 response
                  x-microcks-default: true
                  value:
                    pipelineName: example-resource
                    pipelineExecutionId: '500123'
                    pipelineVersion: 1
                    status: InProgress
                    statusSummary: ACTIVE
        "404":
          description: Execution not found
      tags:
      - Executions
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
components:
  schemas:
    Pipeline:
      type: object
      properties:
        name:
          type: string
          description: The name of the pipeline.
        roleArn:
          type: string
          description: The ARN of the IAM role used by the pipeline.
        stages:
          type: array
          items:
            $ref: "#/components/schemas/StageDeclaration"
        version:
          type: integer
          description: The version number of the pipeline.
    CreatePipelineInput:
      type: object
      required:
      - pipeline
      properties:
        pipeline:
          $ref: "#/components/schemas/Pipeline"
        tags:
          type: array
          items:
            $ref: "#/components/schemas/Tag"
    StageDeclaration:
      type: object
      required:
      - name
      - actions
      properties:
        name:
          type: string
          description: The name of the stage.
        actions:
          type: array
          items:
            $ref: "#/components/schemas/ActionDeclaration"
    ActionDeclaration:
      type: object
      required:
      - name
      - actionTypeId
      properties:
        name:
          type: string
          description: The action declaration name.
        actionTypeId:
          type: object
          properties:
            category:
              type: string
              enum:
              - Source
              - Build
              - Deploy
              - Test
              - Invoke
              - Approval
            owner:
              type: string
            provider:
              type: string
            version:
              type: string
        configuration:
          type: object
          additionalProperties:
            type: string
        inputArtifacts:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
        outputArtifacts:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
    PipelineExecution:
      type: object
      properties:
        pipelineName:
          type: string
        pipelineExecutionId:
          type: string
        pipelineVersion:
          type: integer
        status:
          type: string
          enum:
          - InProgress
          - Stopped
          - Stopping
          - Succeeded
          - Superseded
          - Failed
        statusSummary:
          type: string
    PipelineList:
      type: object
      properties:
        pipelines:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              version:
                type: integer
              created:
                type: string
                format: date-time
              updated:
                type: string
                format: date-time
        nextToken:
          type: string
    Tag:
      type: object
      properties:
        key:
          type: string
        value:
          type: string
tags:
- name: Executions
  description: Operations for managing pipeline executions
- name: Pipelines
  description: Operations for managing CodePipeline pipelines
