security:
- hmac: []
tags:
- name: Pipelines
  description: Operations for managing CodePipeline pipelines
paths:
  /:
    post:
      operationId: CreatePipeline
      summary: Amazon CodePipeline Create a New Pipeline
      description: Creates a pipeline with the specified name and structure. A pipeline consists of stages and actions that process code changes.
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              $ref: '#/components/schemas/CreatePipelineInput'
            examples:
              CreatePipelineRequestExample:
                summary: Default CreatePipeline request
                x-microcks-default: true
                value:
                  pipeline:
                    name: example-resource
                    roleArn: arn:aws:service:us-east-1:123456789012:resource/example
                    stages:
                    - {}
                    version: 1
                  tags:
                  - key: example-value
                    value: example-value
      responses:
        '200':
          description: Pipeline created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pipeline'
              examples:
                CreatePipeline200Example:
                  summary: Default CreatePipeline 200 response
                  x-microcks-default: true
                  value:
                    name: example-resource
                    roleArn: arn:aws:service:us-east-1:123456789012:resource/example
                    stages:
                    - name: example-resource
                      actions: []
                    version: 1
        '400':
          description: Bad request
        '409':
          description: Pipeline already exists
      tags:
      - Pipelines
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /getPipeline:
    post:
      operationId: GetPipeline
      summary: Amazon CodePipeline Get Pipeline Details
      description: Returns the metadata, structure, stages, and actions of a pipeline.
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              required:
              - name
              properties:
                name:
                  type: string
                  description: The name of the pipeline.
                version:
                  type: integer
                  description: The version number of the pipeline.
            examples:
              GetPipelineRequestExample:
                summary: Default GetPipeline request
                x-microcks-default: true
                value:
                  name: example-resource
                  version: 1
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pipeline'
              examples:
                GetPipeline200Example:
                  summary: Default GetPipeline 200 response
                  x-microcks-default: true
                  value:
                    name: example-resource
                    roleArn: arn:aws:service:us-east-1:123456789012:resource/example
                    stages:
                    - name: example-resource
                      actions: []
                    version: 1
        '404':
          description: Pipeline not found
      tags:
      - Pipelines
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /listPipelines:
    post:
      operationId: ListPipelines
      summary: Amazon CodePipeline List Pipelines
      description: Gets a summary of all of the pipelines associated with your account.
      requestBody:
        required: false
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                nextToken:
                  type: string
                maxResults:
                  type: integer
            examples:
              ListPipelinesRequestExample:
                summary: Default ListPipelines request
                x-microcks-default: true
                value:
                  nextToken: example-value
                  maxResults: 1
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineList'
              examples:
                ListPipelines200Example:
                  summary: Default ListPipelines 200 response
                  x-microcks-default: true
                  value:
                    pipelines:
                    - name: example-resource
                      version: 1
                      created: example-value
                      updated: example-value
                    nextToken: example-value
      tags:
      - Pipelines
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /deletePipeline:
    post:
      operationId: DeletePipeline
      summary: Amazon CodePipeline Delete a Pipeline
      description: Deletes the specified pipeline.
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              required:
              - name
              properties:
                name:
                  type: string
                  description: The name of the pipeline to delete.
            examples:
              DeletePipelineRequestExample:
                summary: Default DeletePipeline request
                x-microcks-default: true
                value:
                  name: example-resource
      responses:
        '200':
          description: Pipeline deleted successfully
        '404':
          description: Pipeline not found
      tags:
      - Pipelines
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
components:
  schemas:
    ActionDeclaration:
      type: object
      required:
      - name
      - actionTypeId
      properties:
        name:
          type: string
          description: The action declaration name.
        actionTypeId:
          type: object
          properties:
            category:
              type: string
              enum:
              - Source
              - Build
              - Deploy
              - Test
              - Invoke
              - Approval
            owner:
              type: string
            provider:
              type: string
            version:
              type: string
        configuration:
          type: object
          additionalProperties:
            type: string
        inputArtifacts:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
        outputArtifacts:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
    PipelineList:
      type: object
      properties:
        pipelines:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              version:
                type: integer
              created:
                type: string
                format: date-time
              updated:
                type: string
                format: date-time
        nextToken:
          type: string
    Tag:
      type: object
      properties:
        key:
          type: string
        value:
          type: string
    StageDeclaration:
      type: object
      required:
      - name
      - actions
      properties:
        name:
          type: string
          description: The name of the stage.
        actions:
          type: array
          items:
            $ref: '#/components/schemas/ActionDeclaration'
    Pipeline:
      type: object
      properties:
        name:
          type: string
          description: The name of the pipeline.
        roleArn:
          type: string
          description: The ARN of the IAM role used by the pipeline.
        stages:
          type: array
          items:
            $ref: '#/components/schemas/StageDeclaration'
        version:
          type: integer
          description: The version number of the pipeline.
    CreatePipelineInput:
      type: object
      required:
      - pipeline
      properties:
        pipeline:
          $ref: '#/components/schemas/Pipeline'
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
  securitySchemes:
    hmac:
      type: apiKey
      name: Authorization
      in: header
      description: Amazon Signature authorization v4
      x-amazon-apigateway-authtype: awsSigv4
externalDocs:
  description: Amazon Web Services documentation
  url: https://docs.aws.amazon.com/codepipeline/
x-hasEquivalentPaths: true
