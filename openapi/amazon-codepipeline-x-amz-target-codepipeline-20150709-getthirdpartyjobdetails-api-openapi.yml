paths:
  /#X-Amz-Target=CodePipeline_20150709.GetThirdPartyJobDetails:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: GetThirdPartyJobDetails
      description: <p>Requests the details of a job for a third party action. Used for partner actions only.</p> <important> <p>When this API is called, CodePipeline returns temporary credentials for the S3 bucket used to store artifacts for the pipeline, if the action requires access to that S3 bucket for input or output artifacts. This API also returns any secret values defined for the action.</p> </important>
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetThirdPartyJobDetailsOutput'
              examples:
                GetThirdPartyJobDetails200Example:
                  summary: Default GetThirdPartyJobDetails 200 response
                  x-microcks-default: true
                  value:
                    jobDetails: example-value
        '480':
          description: JobNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobNotFoundException'
              examples:
                GetThirdPartyJobDetails480Example:
                  summary: Default GetThirdPartyJobDetails 480 response
                  x-microcks-default: true
                  value: example-value
        '481':
          description: ValidationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationException'
              examples:
                GetThirdPartyJobDetails481Example:
                  summary: Default GetThirdPartyJobDetails 481 response
                  x-microcks-default: true
                  value: example-value
        '482':
          description: InvalidClientTokenException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidClientTokenException'
              examples:
                GetThirdPartyJobDetails482Example:
                  summary: Default GetThirdPartyJobDetails 482 response
                  x-microcks-default: true
                  value: example-value
        '483':
          description: InvalidJobException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidJobException'
              examples:
                GetThirdPartyJobDetails483Example:
                  summary: Default GetThirdPartyJobDetails 483 response
                  x-microcks-default: true
                  value: example-value
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetThirdPartyJobDetailsInput'
            examples:
              GetThirdPartyJobDetailsRequestExample:
                summary: Default GetThirdPartyJobDetails request
                x-microcks-default: true
                value:
                  jobId: '500123'
                  clientToken: example-value
      parameters:
      - name: X-Amz-Target
        in: header
        required: true
        schema:
          type: string
          enum:
          - CodePipeline_20150709.GetThirdPartyJobDetails
      summary: Amazon CodePipeline Get Third Party Job Details
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - '#X Amz Target=CodePipeline 20150709.GetThirdPartyJobDetails'
components:
  schemas:
    Artifact:
      type: object
      properties:
        name:
          allOf:
          - $ref: '#/components/schemas/ArtifactName'
          - description: The artifact's name.
        revision:
          allOf:
          - $ref: '#/components/schemas/Revision'
          - description: The artifact's revision ID. Depending on the type of object, this could be a commit ID (GitHub) or a revision ID (Amazon S3).
        location:
          allOf:
          - $ref: '#/components/schemas/ArtifactLocation'
          - description: The location of an artifact.
      description: 'Artifacts are the files that are worked on by actions in the pipeline. See the action configuration for each action for details about artifact parameters. For example, the S3 source action artifact is a file name (or file path), and the files are generally provided as a ZIP file. Example artifact name: SampleApp_Windows.zip'
    JobNotFoundException: {}
    ActionContext:
      type: object
      properties:
        name:
          allOf:
          - $ref: '#/components/schemas/ActionName'
          - description: The name of the action in the context of a job.
        actionExecutionId:
          allOf:
          - $ref: '#/components/schemas/ActionExecutionId'
          - description: The system-generated unique ID that corresponds to an action's execution.
      description: Represents the context of an action in the stage of a pipeline to a job worker.
    InvalidClientTokenException: {}
    GetThirdPartyJobDetailsOutput:
      type: object
      properties:
        jobDetails:
          allOf:
          - $ref: '#/components/schemas/ThirdPartyJobDetails'
          - description: The details of the job, including any protected values defined for the job.
      description: Represents the output of a <code>GetThirdPartyJobDetails</code> action.
    S3BucketName:
      type: string
    ActionName:
      type: string
      pattern: '[A-Za-z0-9.@\-_]+'
      minLength: 1
      maxLength: 100
    SecretAccessKey:
      type: string
      format: password
    ActionCategory:
      type: string
      enum:
      - Source
      - Build
      - Deploy
      - Test
      - Invoke
      - Approval
    Nonce:
      type: string
      minLength: 1
      maxLength: 50
    ActionConfiguration:
      type: object
      properties:
        configuration:
          allOf:
          - $ref: '#/components/schemas/ActionConfigurationMap'
          - description: The configuration data for the action.
      description: Represents information about an action configuration.
    S3ObjectKey:
      type: string
    ActionConfigurationMap:
      type: object
      additionalProperties:
        $ref: '#/components/schemas/ActionConfigurationValue'
    Revision:
      type: string
      minLength: 1
      maxLength: 1500
    ValidationException: {}
    AccessKeyId:
      type: string
      format: password
    S3ArtifactLocation:
      type: object
      required:
      - bucketName
      - objectKey
      properties:
        bucketName:
          allOf:
          - $ref: '#/components/schemas/S3BucketName'
          - description: The name of the S3 bucket.
        objectKey:
          allOf:
          - $ref: '#/components/schemas/S3ObjectKey'
          - description: The key of the object in the S3 bucket, which uniquely identifies the object in the bucket.
      description: The location of the S3 bucket that contains a revision.
    PipelineContext:
      type: object
      properties:
        pipelineName:
          allOf:
          - $ref: '#/components/schemas/PipelineName'
          - description: The name of the pipeline. This is a user-specified value. Pipeline names must be unique across all pipeline names under an Amazon Web Services account.
        stage:
          allOf:
          - $ref: '#/components/schemas/StageContext'
          - description: The stage of the pipeline.
        action:
          allOf:
          - $ref: '#/components/schemas/ActionContext'
          - description: The context of an action to a job worker in the stage of a pipeline.
        pipelineArn:
          allOf:
          - $ref: '#/components/schemas/PipelineArn'
          - description: The Amazon Resource Name (ARN) of the pipeline.
        pipelineExecutionId:
          allOf:
          - $ref: '#/components/schemas/PipelineExecutionId'
          - description: The execution ID of the pipeline.
      description: <p>Represents information about a pipeline to a job worker.</p> <note> <p>PipelineContext contains <code>pipelineArn</code> and <code>pipelineExecutionId</code> for custom action jobs. The <code>pipelineArn</code> and <code>pipelineExecutionId</code> fields are not populated for ThirdParty action jobs.</p> </note>
    ActionOwner:
      type: string
      enum:
      - AWS
      - ThirdParty
      - Custom
    GetThirdPartyJobDetailsInput:
      type: object
      required:
      - jobId
      - clientToken
      title: GetThirdPartyJobDetailsInput
      properties:
        jobId:
          allOf:
          - $ref: '#/components/schemas/ThirdPartyJobId'
          - description: The unique system-generated ID used for identifying the job.
        clientToken:
          allOf:
          - $ref: '#/components/schemas/ClientToken'
          - description: The clientToken portion of the clientId and clientToken pair used to verify that the calling entity is allowed access to the job and its details.
      description: Represents the input of a <code>GetThirdPartyJobDetails</code> action.
    EncryptionKeyId:
      type: string
      minLength: 1
      maxLength: 400
    ArtifactLocation:
      type: object
      properties:
        type:
          allOf:
          - $ref: '#/components/schemas/ArtifactLocationType'
          - description: The type of artifact in the location.
        s3Location:
          allOf:
          - $ref: '#/components/schemas/S3ArtifactLocation'
          - description: The S3 bucket that contains the artifact.
      description: Represents information about the location of an artifact.
    SessionToken:
      type: string
      format: password
    PipelineArn:
      type: string
      pattern: arn:aws(-[\w]+)*:codepipeline:.+:[0-9]{12}:.+
    EncryptionKeyType:
      type: string
      enum:
      - KMS
    PipelineName:
      type: string
      pattern: '[A-Za-z0-9.@\-_]+'
      minLength: 1
      maxLength: 100
    AWSSessionCredentials:
      type: object
      required:
      - accessKeyId
      - secretAccessKey
      - sessionToken
      properties:
        accessKeyId:
          allOf:
          - $ref: '#/components/schemas/AccessKeyId'
          - description: The access key for the session.
        secretAccessKey:
          allOf:
          - $ref: '#/components/schemas/SecretAccessKey'
          - description: The secret access key for the session.
        sessionToken:
          allOf:
          - $ref: '#/components/schemas/SessionToken'
          - description: The token for the session.
      description: Represents an Amazon Web Services session credentials object. These credentials are temporary credentials that are issued by Amazon Web Services Secure Token Service (STS). They can be used to access input and output artifacts in the S3 bucket used to store artifact for the pipeline in CodePipeline.
    ThirdPartyJobData:
      type: object
      properties:
        actionTypeId:
          allOf:
          - $ref: '#/components/schemas/ActionTypeId'
          - description: Represents information about an action type.
        actionConfiguration:
          allOf:
          - $ref: '#/components/schemas/ActionConfiguration'
          - description: Represents information about an action configuration.
        pipelineContext:
          allOf:
          - $ref: '#/components/schemas/PipelineContext'
          - description: <p>Represents information about a pipeline to a job worker.</p> <note> <p>Does not include <code>pipelineArn</code> and <code>pipelineExecutionId</code> for ThirdParty jobs.</p> </note>
        inputArtifacts:
          allOf:
          - $ref: '#/components/schemas/ArtifactList'
          - description: The name of the artifact that is worked on by the action, if any. This name might be system-generated, such as "MyApp", or it might be defined by the user when the action is created. The input artifact name must match the name of an output artifact generated by an action in an earlier action or stage of the pipeline.
        outputArtifacts:
          allOf:
          - $ref: '#/components/schemas/ArtifactList'
          - description: The name of the artifact that is the result of the action, if any. This name might be system-generated, such as "MyBuiltApp", or it might be defined by the user when the action is created.
        artifactCredentials:
          allOf:
          - $ref: '#/components/schemas/AWSSessionCredentials'
          - description: 'Represents an Amazon Web Services session credentials object. These credentials are temporary credentials that are issued by Amazon Web Services Secure Token Service (STS). They can be used to access input and output artifacts in the S3 bucket used to store artifact for the pipeline in CodePipeline. '
        continuationToken:
          allOf:
          - $ref: '#/components/schemas/ContinuationToken'
          - description: A system-generated token, such as a CodeDeploy deployment ID, that a job requires to continue the job asynchronously.
        encryptionKey:
          allOf:
          - $ref: '#/components/schemas/EncryptionKey'
          - description: The encryption key used to encrypt and decrypt data in the artifact store for the pipeline, such as an Amazon Web Services Key Management Service (Amazon Web Services KMS) key. This is optional and might not be present.
      description: Represents information about the job data for a partner action.
    Version:
      type: string
      pattern: '[0-9A-Za-z_-]+'
      minLength: 1
      maxLength: 9
    ActionTypeId:
      type: object
      required:
      - category
      - owner
      - provider
      - version
      properties:
        category:
          allOf:
          - $ref: '#/components/schemas/ActionCategory'
          - description: <p>A category defines what kind of action can be taken in the stage, and constrains the provider type for the action. Valid categories are limited to one of the following values. </p> <ul> <li> <p>Source</p> </li> <li> <p>Build</p> </li> <li> <p>Test</p> </li> <li> <p>Deploy</p> </li> <li> <p>Invoke</p> </li> <li> <p>Approval</p> </li> </ul>
        owner:
          allOf:
          - $ref: '#/components/schemas/ActionOwner'
          - description: 'The creator of the action being called. There are three valid values for the <code>Owner</code> field in the action category section within your pipeline structure: <code>AWS</code>, <code>ThirdParty</code>, and <code>Custom</code>. For more information, see <a href="https://docs.aws.amazon.com/codepipeline/latest/userguide/reference-pipeline-structure.html#actions-valid-providers">Valid Action Types and Providers in CodePipeline</a>.'
        provider:
          allOf:
          - $ref: '#/components/schemas/ActionProvider'
          - description: The provider of the service being called by the action. Valid providers are determined by the action category. For example, an action in the Deploy category type might have a provider of CodeDeploy, which would be specified as <code>CodeDeploy</code>. For more information, see <a href="https://docs.aws.amazon.com/codepipeline/latest/userguide/reference-pipeline-structure.html#actions-valid-providers">Valid Action Types and Providers in CodePipeline</a>.
        version:
          allOf:
          - $ref: '#/components/schemas/Version'
          - description: A string that describes the action version.
      description: Represents information about an action type.
    PipelineExecutionId:
      type: string
      pattern: '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'
    ThirdPartyJobId:
      type: string
      minLength: 1
      maxLength: 512
    ArtifactList:
      type: array
      items:
        $ref: '#/components/schemas/Artifact'
    ThirdPartyJobDetails:
      type: object
      properties:
        id:
          allOf:
          - $ref: '#/components/schemas/ThirdPartyJobId'
          - description: The identifier used to identify the job details in CodePipeline.
        data:
          allOf:
          - $ref: '#/components/schemas/ThirdPartyJobData'
          - description: The data to be returned by the third party job worker.
        nonce:
          allOf:
          - $ref: '#/components/schemas/Nonce'
          - description: A system-generated random number that CodePipeline uses to ensure that the job is being worked on by only one job worker. Use this number in an <a>AcknowledgeThirdPartyJob</a> request.
      description: The details of a job sent in response to a <code>GetThirdPartyJobDetails</code> request.
    ActionProvider:
      type: string
      pattern: '[0-9A-Za-z_-]+'
      minLength: 1
      maxLength: 35
    EncryptionKey:
      type: object
      required:
      - id
      - type
      properties:
        id:
          allOf:
          - $ref: '#/components/schemas/EncryptionKeyId'
          - description: <p>The ID used to identify the key. For an Amazon Web Services KMS key, you can use the key ID, the key ARN, or the alias ARN.</p> <note> <p>Aliases are recognized only in the account that created the KMS key. For cross-account actions, you can only use the key ID or key ARN to identify the key. Cross-account actions involve using the role from the other account (AccountB), so specifying the key ID will use the key from the other account (AccountB).</p> </note>
        type:
          allOf:
          - $ref: '#/components/schemas/EncryptionKeyType'
          - description: The type of encryption key, such as an Amazon Web Services KMS key. When creating or updating a pipeline, the value must be set to 'KMS'.
      description: Represents information about the key used to encrypt data in the artifact store, such as an Amazon Web Services Key Management Service (Key Management Service) key.
    ActionConfigurationValue:
      type: string
      minLength: 1
      maxLength: 1000
    StageName:
      type: string
      pattern: '[A-Za-z0-9.@\-_]+'
      minLength: 1
      maxLength: 100
    ArtifactLocationType:
      type: string
      enum:
      - S3
    StageContext:
      type: object
      properties:
        name:
          allOf:
          - $ref: '#/components/schemas/StageName'
          - description: The name of the stage.
      description: Represents information about a stage to a job worker.
    ArtifactName:
      type: string
      pattern: '[a-zA-Z0-9_\-]+'
      minLength: 1
      maxLength: 100
    ActionExecutionId:
      type: string
    InvalidJobException: {}
    ContinuationToken:
      type: string
      minLength: 1
      maxLength: 2048
    ClientToken:
      type: string
      minLength: 1
      maxLength: 256
  parameters:
    X-Amz-SignedHeaders:
      name: X-Amz-SignedHeaders
      in: header
      schema:
        type: string
      required: false
    X-Amz-Signature:
      name: X-Amz-Signature
