paths:
  /#X-Amz-Target=CodePipeline_20150709.GetPipelineExecution:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: GetPipelineExecution
      description: Returns information about an execution of a pipeline, including details about artifacts, the pipeline execution ID, and the name, version, and status of the pipeline.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPipelineExecutionOutput'
              examples:
                GetPipelineExecution200Example:
                  summary: Default GetPipelineExecution 200 response
                  x-microcks-default: true
                  value:
                    pipelineExecution: example-value
        '480':
          description: ValidationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationException'
              examples:
                GetPipelineExecution480Example:
                  summary: Default GetPipelineExecution 480 response
                  x-microcks-default: true
                  value: example-value
        '481':
          description: PipelineNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineNotFoundException'
              examples:
                GetPipelineExecution481Example:
                  summary: Default GetPipelineExecution 481 response
                  x-microcks-default: true
                  value: example-value
        '482':
          description: PipelineExecutionNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineExecutionNotFoundException'
              examples:
                GetPipelineExecution482Example:
                  summary: Default GetPipelineExecution 482 response
                  x-microcks-default: true
                  value: example-value
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetPipelineExecutionInput'
            examples:
              GetPipelineExecutionRequestExample:
                summary: Default GetPipelineExecution request
                x-microcks-default: true
                value:
                  pipelineName: example-resource
                  pipelineExecutionId: '500123'
      parameters:
      - name: X-Amz-Target
        in: header
        required: true
        schema:
          type: string
          enum:
