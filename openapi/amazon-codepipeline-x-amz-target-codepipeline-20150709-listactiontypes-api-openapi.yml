          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidNextTokenException'
              examples:
                ListActionTypes481Example:
                  summary: Default ListActionTypes 481 response
                  x-microcks-default: true
                  value: STANDARD
      requestBody:
        required: true
