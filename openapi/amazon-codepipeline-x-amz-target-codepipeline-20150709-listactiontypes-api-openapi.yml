    post:
      operationId: ListActionTypes
      description: Gets a summary of all CodePipeline action types associated with your account.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListActionTypesOutput'
              examples:
                ListActionTypes200Example:
                  summary: Default ListActionTypes 200 response
                  x-microcks-default: true
                  value:
                    actionTypes: STANDARD
                    nextToken: example-value
        '480':
          description: ValidationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationException'
              examples:
                ListActionTypes480Example:
                  summary: Default ListActionTypes 480 response
                  x-microcks-default: true
                  value: STANDARD
        '481':
