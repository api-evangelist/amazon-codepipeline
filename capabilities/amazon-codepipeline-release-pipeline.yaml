naftiko: 1.0.0-alpha1
info:
  label: Amazon CodePipeline Release Pipeline Automation
  description: Unified workflow for DevOps and release engineering teams to create and manage delivery pipelines, trigger pipeline executions, monitor pipeline status, and manage pipeline artifacts 
    using Amazon CodePipeline.
  tags:
  - Amazon
  - AWS
  - CI/CD
  - Continuous Delivery
  - DevOps
  - Pipeline
  - Release Automation
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
    AWS_REGION: AWS_REGION
capability:
  consumes:
  - import: codepipeline
    location: ./shared/codepipeline.yaml
  exposes:
  - type: rest
    port: 8080
    namespace: codepipeline-release-pipeline-api
    description: Unified REST API for Release Pipeline Automation.
    resources:
    - path: /v1/listPipelines
      name: list-pipelines
      description: List pipelines in the account
    - path: /v1/getPipeline
      name: get-pipeline
      description: Get the structure and details of a pipeline
    - path: /v1/createPipeline
      name: create-pipeline
      description: Create a new delivery pipeline
    - path: /v1/updatePipeline
      name: update-pipeline
      description: Update the structure of a pipeline
  - type: mcp
    port: 9090
    namespace: codepipeline-release-pipeline-mcp
    transport: http
    description: MCP server for AI-assisted Release Pipeline Automation.
    tools:
    - name: list-pipelines
      description: List pipelines in the account
      hints:
        readOnly: true
        openWorld: true
      call: codepipeline.listPipelines
      outputParameters:
      - type: object
        mapping: $.
    - name: get-pipeline
      description: Get the structure and details of a pipeline
      hints:
        readOnly: true
        openWorld: true
      call: codepipeline.getPipeline
      outputParameters:
      - type: object
        mapping: $.
    - name: create-pipeline
      description: Create a new delivery pipeline
      hints:
        readOnly: false
        openWorld: true
      call: codepipeline.createPipeline
      outputParameters:
      - type: object
        mapping: $.
    - name: update-pipeline
      description: Update the structure of a pipeline
      hints:
        readOnly: false
        openWorld: true
      call: codepipeline.updatePipeline
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-pipeline
      description: Delete a pipeline
      hints:
        readOnly: false
        openWorld: true
      call: codepipeline.deletePipeline
      outputParameters:
      - type: object
        mapping: $.
    - name: start-pipeline-execution
      description: Start a pipeline execution
      hints:
        readOnly: false
        openWorld: true
      call: codepipeline.startPipelineExecution
      outputParameters:
      - type: object
        mapping: $.
    - name: stop-pipeline-execution
      description: Stop an in-progress pipeline execution
      hints:
        readOnly: false
        openWorld: true
      call: codepipeline.stopPipelineExecution
      outputParameters:
      - type: object
        mapping: $.
    - name: get-pipeline-execution
      description: Get details about a pipeline execution
      hints:
        readOnly: true
        openWorld: true
      call: codepipeline.getPipelineExecution
      outputParameters:
      - type: object
        mapping: $.
    - name: list-pipeline-executions
      description: List executions for a pipeline
      hints:
        readOnly: true
        openWorld: true
      call: codepipeline.listPipelineExecutions
      outputParameters:
      - type: object
        mapping: $.
    - name: get-pipeline-state
      description: Get the current state of each stage in a pipeline
      hints:
        readOnly: true
        openWorld: true
      call: codepipeline.getPipelineState
      outputParameters:
      - type: object
        mapping: $.
    - name: list-action-executions
      description: List action executions for a pipeline
      hints:
        readOnly: true
        openWorld: true
      call: codepipeline.listActionExecutions
      outputParameters:
      - type: object
        mapping: $.
    - name: put-approval-result
      description: Submit approval or rejection for a manual approval action
      hints:
        readOnly: false
        openWorld: true
      call: codepipeline.putApprovalResult
      outputParameters:
      - type: object
        mapping: $.
    - name: retry-stage-execution
      description: Retry all failed actions in a pipeline stage
      hints:
        readOnly: false
        openWorld: true
      call: codepipeline.retryStageExecution
      outputParameters:
      - type: object
        mapping: $.
    - name: list-webhooks
      description: List pipeline webhooks
      hints:
        readOnly: true
        openWorld: true
      call: codepipeline.listWebhooks
      outputParameters:
      - type: object
        mapping: $.
