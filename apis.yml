aid: amazon-codepipeline
name: Amazon CodePipeline
description: AWS CodePipeline is a fully managed continuous delivery service that helps you automate your release pipelines for fast and reliable application and infrastructure updates. CodePipeline 
  automates the build, test, and deploy phases of your release process every time there is a code change, based on the release model you define.
